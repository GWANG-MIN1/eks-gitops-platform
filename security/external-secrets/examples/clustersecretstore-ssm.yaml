# Example: a ClusterSecretStore backed by AWS SSM Parameter Store.
#
# Apply after the operator is running AND its ServiceAccount has the IRSA role
# annotation (see ../values.yaml). No `auth` block: the controller uses its own
# pod (IRSA) credentials.
#
#   kubectl apply -f security/external-secrets/examples/clustersecretstore-ssm.yaml
#   kubectl get clustersecretstore aws-ssm   # STATUS should be Valid
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-ssm
spec:
  provider:
    aws:
      service: ParameterStore
      region: ap-northeast-2
