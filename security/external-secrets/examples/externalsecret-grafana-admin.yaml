# Example: pull Grafana's admin credentials from SSM into a Kubernetes Secret.
#
# This closes the loop on the Phase 3 note that Grafana's password shouldn't live
# in Git. The values come from SSM parameters you create once:
#
#   aws ssm put-parameter --type SecureString \
#     --name /eks-gitops/dev/grafana/admin-user     --value admin
#   aws ssm put-parameter --type SecureString \
#     --name /eks-gitops/dev/grafana/admin-password --value "$(openssl rand -base64 24)"
#
# ESO then materialises a `grafana-admin` Secret in the observability namespace.
# Point Grafana at it in observability/kube-prometheus-stack/values.yaml:
#
#   grafana:
#     admin:
#       existingSecret: grafana-admin
#       userKey: admin-user
#       passwordKey: admin-password
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: /eks-gitops/dev/grafana/admin-user
    - secretKey: admin-password
      remoteRef:
        key: /eks-gitops/dev/grafana/admin-password
