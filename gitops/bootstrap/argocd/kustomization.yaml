apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ArgoCD install, pinned to a specific release. Bumping ArgoCD is then a
# one-line, reviewable change here instead of a mystery `stable` tag.
#
# Upstream install manifest:
#   https://github.com/argoproj/argo-cd/blob/v2.13.4/manifests/install.yaml
#
# Applied once, by hand, to bootstrap the cluster:
#   kubectl apply -k gitops/bootstrap/argocd
#
# After that, ArgoCD manages everything else via gitops/bootstrap/root-app.yaml.

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.4/manifests/install.yaml
