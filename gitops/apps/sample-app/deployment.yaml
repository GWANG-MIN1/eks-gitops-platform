# Demo workload — a rootless nginx that just serves a page. Its only job is to
# prove the GitOps loop end to end: change this file, push, watch ArgoCD sync.
#
# Kept deliberately well-behaved so it also survives the Phase 4 security gates:
# pinned image (no :latest), resource requests/limits, non-root, dropped caps.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: eks-gitops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-app
        app.kubernetes.io/part-of: eks-gitops-platform
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          # nginx-unprivileged listens on 8080 and runs as a non-root user.
          # Pinned to the current stable patch — the Trivy CI gate caught a fixable
          # CRITICAL in 1.27-alpine, so it was bumped (the gate doing its job).
          image: nginxinc/nginx-unprivileged:1.30.4-alpine
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            # Left writable so nginx can manage its own temp/cache dirs out of the
            # box. Phase 4 tightens this (readOnlyRootFilesystem + emptyDir mounts).
            readOnlyRootFilesystem: false
