# ClusterIP is enough to prove the loop — reach it with `kubectl port-forward`.
# A public URL (ALB Ingress + ACM/Route53) is intentionally deferred; it belongs
# with the ingress work, not the "does GitOps sync?" demo.
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  labels:
    app.kubernetes.io/name: sample-app
    app.kubernetes.io/part-of: eks-gitops-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sample-app
  ports:
    - name: http
      port: 80
      targetPort: http
