# Child Application: Kyverno (policy engine).
#
# sync-wave 0 so Kyverno and its CRDs land before the policies in
# kyverno-policies.yaml (sync-wave 1), which are Kyverno custom resources and need
# the CRDs to exist first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://kyverno.github.io/kyverno
      chart: kyverno
      targetRevision: 3.8.2
      helm:
        releaseName: kyverno
        valueFiles:
          - $values/security/kyverno/values.yaml
    - repoURL: https://github.com/GWANG-MIN1/eks-gitops-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  # The chart's CRDs carry spec.versions[].selectableFields — a k8s 1.31+
  # feature. Our 1.30 API server silently drops it, so live can never match Git
  # and the app sits OutOfSync forever (verified on the live cluster). Ignore
  # the field until the cluster is on 1.31+.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.versions[].selectableFields
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Kyverno's CRDs are large enough to blow the client-side apply annotation
      # limit — same story as the Prometheus operator.
      - ServerSideApply=true
      # Don't re-apply the ignored fields either — otherwise every sync tries to
      # set them and the API server drops them again.
      - RespectIgnoreDifferences=true
