# Child Application: External Secrets Operator.
#
# Installs just the operator (+ CRDs). The SecretStore and ExternalSecret that
# actually pull from AWS are account-specific — they need the IRSA role ARN and
# real SSM parameters — so they're shipped as apply-after-setup examples under
# security/external-secrets/examples/, not synced here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.7.0
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/security/external-secrets/values.yaml
    - repoURL: https://github.com/GWANG-MIN1/eks-gitops-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  # Same story as the kyverno app: the CRD ships spec.versions[].selectableFields
  # (k8s 1.31+), our 1.30 API server drops it, live can never match Git. Ignore
  # until the cluster is on 1.31+.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec.versions[].selectableFields
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ESO's ExternalSecret CRD is large — server-side apply avoids the
      # client-side annotation size limit.
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
